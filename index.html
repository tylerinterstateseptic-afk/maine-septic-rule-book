<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Maine Ch. 241 Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column}
#setup{max-width:480px;margin:40px auto;padding:24px;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.1)}
h1{font-size:1.2rem;color:#1a1a2e;margin-bottom:8px}
p{font-size:.85rem;color:#666;margin-bottom:16px}
label{display:block;font-size:.8rem;font-weight:600;color:#444;margin:12px 0 4px}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:.9rem;outline:none}
input:focus{border-color:#4f46e5}
#btn{margin-top:18px;width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer}
#btn:hover{background:#4338ca}
#err{color:#dc2626;font-size:.82rem;margin-top:8px;display:none}
#status{color:#16a34a;font-size:.82rem;margin-top:8px;display:none}
#chat{display:none;flex-direction:column;height:100vh;max-width:700px;margin:0 auto;width:100%}
#hdr{background:#1a1a2e;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#hdr h2{font-size:.95rem}
#hdr span{font-size:.75rem;color:#a5b4fc}
#rst{background:transparent;border:1px solid #4f46e5;color:#a5b4fc;padding:5px 10px;border-radius:6px;font-size:.75rem;cursor:pointer}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.m{max-width:85%;padding:12px 14px;border-radius:12px;font-size:.9rem;line-height:1.5}
.u{background:#4f46e5;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.a{background:#fff;color:#1a1a2e;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.s{background:#fef3c7;color:#92400e;font-size:.8rem;align-self:center;border-radius:8px;padding:8px 12px;text-align:center}
.e{background:#fee2e2;color:#dc2626;font-size:.85rem;align-self:center;border-radius:8px;padding:8px 12px}
.t{color:#9ca3af;font-style:italic}
#inp{padding:12px 16px 20px;background:#fff;border-top:1px solid #e5e7eb;flex-shrink:0;display:flex;gap:8px;align-items:flex-end}
#txt{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:24px;font-size:.9rem;resize:none;max-height:120px;outline:none;font-family:inherit}
#txt:focus{border-color:#4f46e5}
#snd{background:#4f46e5;color:#fff;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.1rem;flex-shrink:0}
#snd:hover{background:#4338ca}
#snd:disabled{background:#c4b5fd;cursor:not-allowed}
</style>
</head>
<body>
<div id="setup">
<h1>Maine Ch. 241 Rule Reference</h1>
<p>One-time setup. Saved locally in your browser.</p>
<label>Anthropic API Key</label>
<input type="password" id="key" placeholder="sk-ant-api03-..."/>
<label>PDF URL</label>
<input type="text" id="url" value="https://raw.githubusercontent.com/tylerinterstateseptic-afk/maine-septic-rule-book/main/ch241.pdf"/>
<button id="btn">Save and Load Rule Book</button>
<div id="err"></div>
<div id="status"></div>
</div>
<div id="chat">
<div id="hdr"><div><h2>Maine Ch. 241 Rule Reference</h2><span>Answers from the full rule book including tables</span></div><button id="rst">Setup</button></div>
<div id="msgs"></div>
<div id="inp"><textarea id="txt" rows="1" placeholder="Ask about Ch. 241..."></textarea><button id="snd">^</button></div>
</div>
<script>
var KA="ch241k",KU="ch241u",KB="ch241b64";
var apiKey="",pdfB64="",hist=[],busy=false;
function ge(id){return document.getElementById(id);}
var setup=ge("setup"),chat=ge("chat"),keyIn=ge("key"),urlIn=ge("url");
var btn=ge("btn"),err=ge("err"),sts=ge("status"),msgs=ge("msgs"),txt=ge("txt"),snd=ge("snd"),rst=ge("rst");
function init(){
  var k=localStorage.getItem(KA),u=localStorage.getItem(KU),b=localStorage.getItem(KB);
  if(k)keyIn.value=k;
  if(u)urlIn.value=u;
  if(k&&b){apiKey=k;pdfB64=b;showChat();}
}
btn.addEventListener("click",function(){
  var k=keyIn.value.trim(),u=urlIn.value.trim();
  hideMsg();
  if(k.indexOf("sk-")!==0){showErr("API key must start with sk-");return;}
  if(u.indexOf("http")!==0){showErr("Enter a valid URL");return;}
  btn.disabled=true;
  showOk("Downloading PDF...");
  fetch(u).then(function(r){
    if(!r.ok)throw new Error("Fetch failed: "+r.status);
    return r.arrayBuffer();
  }).then(function(buf){
    showOk("Processing PDF...");
    var bytes=new Uint8Array(buf);
    var binary="";
    for(var i=0;i<bytes.byteLength;i++){binary+=String.fromCharCode(bytes[i]);}
    var b64=btoa(binary);
    try{
      localStorage.setItem(KA,k);
      localStorage.setItem(KU,u);
      localStorage.setItem(KB,b64);
    }catch(e){
      showErr("Storage full - try clearing browser data");btn.disabled=false;return;
    }
    apiKey=k;pdfB64=b64;
    showOk("Loaded! Opening chat...");
    setTimeout(showChat,800);
  }).catch(function(e){showErr("Error: "+e.message);btn.disabled=false;});
});
rst.addEventListener("click",function(){
  localStorage.removeItem(KB);
  pdfB64="";hist=[];
  chat.style.display="none";setup.style.display="block";msgs.innerHTML="";
});
snd.addEventListener("click",send);
txt.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
txt.addEventListener("input",function(){txt.style.height="auto";txt.style.height=Math.min(txt.scrollHeight,120)+"px";});
function send(){
  var t=txt.value.trim();
  if(!t||busy)return;
  addMsg("u",t);txt.value="";txt.style.height="auto";
  hist.push(t);
  busy=true;snd.disabled=true;
  var tm=addMsg("a t","...");
  callApi(hist).then(function(reply){
    tm.remove();addMsg("a",reply);
    hist.push(reply);
  }).catch(function(e){
    tm.remove();addMsg("e","Error: "+e.message);
  }).then(function(){busy=false;snd.disabled=false;});
}
function callApi(history){
  var sys="You are a strict reference assistant for Maine 10-144 CMR Chapter 241 Subsurface Wastewater Disposal Rules. The full rule book PDF is attached - read ALL content including tables and figures. Answer ONLY from the rule book. Cite the exact section number with every answer. If not in the rule book, say: That is not addressed in Ch. 241 - consult a licensed designer or the Maine DEP.";
  var messages=[];
  for(var i=0;i<history.length;i++){
    if(i%2===0){
      var content=[{type:"text",text:history[i]}];
      if(i===0){
        content.unshift({type:"document",source:{type:"base64",media_type:"application/pdf",data:pdfB64},cache_control:{type:"ephemeral"}});
      }
      messages.push({role:"user",content:content});
    }else{
      messages.push({role:"assistant",content:history[i]});
    }
  }
  return fetch("https://ch241-proxy.tyler-interstateseptic.workers.dev",{
    method:"POST",
    headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-beta":"pdfs-2024-09-25"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1024,system:sys,messages:messages})
  }).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message?e.error.message:"API error "+r.status);});
    return r.json();
  }).then(function(d){return d.content[0].text;});
}
function addMsg(cls,text){
  var d=document.createElement("div");
  d.className="m "+cls;d.textContent=text;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;
}
function showChat(){setup.style.display="none";chat.style.display="flex";addMsg("s","Rule book loaded including all tables. Ask anything about Ch. 241.");}
function showErr(m){err.textContent=m;err.style.display="block";sts.style.display="none";}
function showOk(m){sts.textContent=m;sts.style.display="block";err.style.display="none";}
function hideMsg(){err.style.display="none";sts.style.display="none";}
init();
</script>
</body>
</html>
